name: E2E

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  # ---------------------------------------------------------------------------
  # PR subset — runs on every PR. Kept tight (~3-5 min target) to keep the
  # signal-to-latency ratio high. Covers: smoke, the full configurator happy
  # path, the expert-mode regression, the public API contract, and the trial
  # gate. Same full install so Vitest unit tests also run.
  # ---------------------------------------------------------------------------
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build widget (IIFE) for widget specs
        run: pnpm --filter @aerolume/widget build

      - name: Install Playwright browsers
        run: pnpm --filter @aerolume/web exec playwright install --with-deps chromium

      - name: Run Vitest (unit)
        run: pnpm --filter @aerolume/web test

      - name: Run Playwright (PR subset)
        run: >
          pnpm --filter @aerolume/web test:e2e --
          --project=chromium
          smoke
          configurator/full-happy-path
          configurator/expert-mode-variant-isolation
          api-public
          api-internal/trial-gate
        env:
          CI: 'true'
          E2E_BASE_URL: http://localhost:3000
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_SERVICE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_KEY }}
          E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          E2E_LEMONSQUEEZY_WEBHOOK_SECRET: ${{ secrets.E2E_LEMONSQUEEZY_WEBHOOK_SECRET }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_KEY }}
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          NEXT_PUBLIC_DEMO_API_KEY: ${{ secrets.E2E_DEMO_API_KEY }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Full suite — runs only on pushes to master/main (post-merge). Targets
  # ~10-12 min. Runs everything including dashboard, admin, widget, webhooks,
  # and security negative paths.
  # ---------------------------------------------------------------------------
  e2e-full:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build widget (IIFE) for widget specs
        run: pnpm --filter @aerolume/widget build

      - name: Install Playwright browsers
        run: pnpm --filter @aerolume/web exec playwright install --with-deps chromium

      - name: Run Vitest (unit)
        run: pnpm --filter @aerolume/web test

      - name: Run Playwright (full)
        run: pnpm --filter @aerolume/web test:e2e -- --project=chromium
        env:
          CI: 'true'
          E2E_BASE_URL: http://localhost:3000
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_SERVICE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_KEY }}
          E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          E2E_LEMONSQUEEZY_WEBHOOK_SECRET: ${{ secrets.E2E_LEMONSQUEEZY_WEBHOOK_SECRET }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_KEY }}
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          NEXT_PUBLIC_DEMO_API_KEY: ${{ secrets.E2E_DEMO_API_KEY }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: apps/web/playwright-report/
          retention-days: 7
